services:
  data-init:
    build:
      context: ./api
      dockerfile: Dockerfile.data-init
    platform: linux/amd64  # for macOS+docker+kumo support
    volumes:
      - ecommerce_data:/app/data
      - ~/.kaggle:/home/app/.kaggle:ro  # Mount Kaggle credentials
    environment:
      - DATA_DIR=/app/data
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-}
      - KAGGLE_KEY=${KAGGLE_KEY:-}
    networks:
      - agentdemo
    restart: "no"  # Only run once

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    platform: linux/amd64  # for macOS+docker+kumo support
    volumes:
      - ./api:/app/api:Z
      - ecommerce_data:/app/data:ro  # Mount data volume as read-only
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KUMO_API_KEY=${KUMO_API_KEY}
      - DATA_DIR=/app/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    networks:
      - agentdemo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - agentdemo
  
  jaeger:
    image: jaegertracing/all-in-one
    ports:
        - 4318
        - 16686:16686
    environment:
        COLLECTOR_OTLP_ENABLED: true
    networks:
      - agentdemo

  prometheus:
    image: prom/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./prometheus/:/etc/prometheus/
    ports:
      - 9090:9090
    networks:
      - agentdemo

  collector:
    image: otel/opentelemetry-collector-contrib
    volumes: 
      - ./collector/collector.yml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "8889:8889"
    networks:
      - agentdemo

volumes:
  ecommerce_data:
    driver: local

networks:
  agentdemo:
